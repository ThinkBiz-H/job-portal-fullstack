<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const blogContainer = document.getElementById("blogs");

// 📅 Format Date
function formatDate(date) {
  if (!date) return "Recently";

  try {
    const d = date.toDate ? date.toDate() : new Date(date);
    return d.toLocaleDateString("en-IN", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });
  } catch {
    return "Recently";
  }
}

// 🧹 Remove HTML
function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.textContent || "";
}

// 🔐 Escape HTML
function escapeHtml(text) {
  if (!text) return "";
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// 🚀 Load Blogs
async function loadBlogs() {
  try {
    const q = query(collection(db, "blogs"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      blogContainer.innerHTML = "<h3>No blogs found</h3>";
      return;
    }

    let html = "";

    snapshot.forEach((doc) => {
      const data = doc.data();

      const title = data.title || "Untitled";
      const content = data.content || "";
      const excerpt = stripHtml(content).substring(0, 120);
      const image = data.image || "https://via.placeholder.com/400x250";
      const date = formatDate(data.createdAt);

      html += `
        <div class="blog-card">

<img 
  class="blog-image" 
  src="${image}" 
  alt="${escapeHtml(title)}"
  onerror="this.src='https://via.placeholder.com/400x250'"
>

          <div class="blog-info">

            <h3 class="blog-title">${escapeHtml(title)}</h3>

            <div class="blog-meta">
              <span>${escapeHtml(date)}</span>
            </div>

            <p class="blog-excerpt">
              ${escapeHtml(excerpt)}...
            </p>

<a href="/blog/${data.slug}" class="read-more">
              Read More →
            </a>

          </div>
        </div>
      `;
    });

    blogContainer.innerHTML = html;

  } catch (error) {
    console.error(error);
    blogContainer.innerHTML = "<h3>Error loading blogs</h3>";
  }
}

loadBlogs();
</script>
