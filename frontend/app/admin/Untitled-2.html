  // Helper: reading time
  function calculateReadingTime(content) {
    if (!content) return 1;
    const wordsPerMinute = 210;
    const text = content.replace(/<[^>]*>/g, '');
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / wordsPerMinute));
  }

  // Format date
  function formatDate(date) {
    if (!date) return "Fresh story";
    try {
      const dateObj = date.toDate ? date.toDate() : new Date(date);
      return dateObj.toLocaleDateString("en-US", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    } catch { return "Recently"; }
  }

  // Enhanced content formatter (supports markdown-ish syntax)
  function formatRichContent(content) {
    if (!content) return '<p class="text-center">✨ No content yet, but the magic is brewing...</p>';
    
    let processed = content
      .replace(/<p>/g, '')
      .replace(/<\/p>/g, '')
      .replace(/<br\s*\/?>/gi, '\n');
    
    // Headings
    processed = processed.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    processed = processed.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    processed = processed.replace(/^# (.*?)$/gm, '<h2>$1</h2>');
    
    // Code blocks
    processed = processed.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    processed = processed.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    // Blockquotes
    processed = processed.replace(/^> (.*?)$/gm, '<blockquote>$1</blockquote>');
    
    // Paragraphs: split double newlines
    const paragraphs = processed.split(/\n\s*\n/);
    const formatted = paragraphs.map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<pre') || p.startsWith('<blockquote')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('');
    
    return formatted || `<p>${escapeHtml(content.substring(0, 500))}</p>`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

      // For demo / fallback: if no slug found and we are in a local/test scenario,
      // we can display a rich sample blog post for preview (so screen never stays empty)
      // but we still try firestore first.

        showDemoBlog();
        return;

      const q = query(collection(db, "blogs"), where("slug", "==", slug));
      const querySnapshot = await getDocs(q);

        // Instead of error, show an elegant demo fallback to keep UX premium
        showDemoBlog("Story not found? Here's a featured read for you.");
        return;

      renderBlogPost(docData);

  } else {
    el.style.display = "block";
  }
};
</script>
