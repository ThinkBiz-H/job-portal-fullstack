// Toast notification (enhanced style)
function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = isError ? 'rgba(220, 38, 38, 0.95)' : 'rgba(16, 185, 129, 0.95)';
  toast.style.backdropFilter = 'blur(12px)';
  toast.style.borderLeftColor = isError ? '#EF4444' : '#10B981';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Image preview handling
document.getElementById('imageFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const previewDiv = document.getElementById('imagePreview');
      previewDiv.style.display = 'block';
      previewDiv.innerHTML = `
        <img src="${event.target.result}" alt="Preview">
        <div class="remove-image" onclick="window.removeImage()">×</div>
      `;
    };
    reader.readAsDataURL(file);
  }
});

function generateSlug(title) {
  return title
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")   // remove special chars
    .replace(/\s+/g, "-")           // space → -
    .replace(/-+/g, "-");           // multiple - fix
}

  const faqData = faqs.filter(f => f.question && f.answer);

  if (!titleVal || !contentVal) {
    showToast("Please fill title and content", true);
    return;
  }

  try {
    let imageUrl = currentImageUrl || "";
    if (file) {
      imageUrl = await uploadImage(file);
    }

    // 🔥 NEW: slug create
    const slug = generateSlug(titleVal);

    if (editId) {
      await updateDoc(doc(db, "blogs", editId), {
        title: titleVal,
        metaTitle,
        metaDesc,
        content: contentVal,
        image: imageUrl,
        slug: slug ,
        faq: faqData// ✅ ADD THIS
      });
      showToast("Blog updated!");
      cancelEdit();
    } else {
      await addDoc(collection(db, "blogs"), {
        title: titleVal,
        metaTitle,
        metaDesc,
        content: contentVal,
        image: imageUrl,
        slug: slug, 
         faq: faqData,
        createdAt: new Date()
      });
      showToast("Blog published!");
    }

    // reset
    document.getElementById('title').value = "";
    document.getElementById('metaTitle').value = "";
    document.getElementById('metaDesc').value = "";
    editor.setData("");
    document.getElementById('imageFile').value = "";
    document.getElementById('imagePreview').style.display = "none";

    loadBlogs();

  } catch (e) {
    console.error(e);
    showToast("Error saving blog", true);
  }
};// Load blogs (preserved)
async function loadBlogs() {
  const q = query(collection(db, "blogs"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);
  let html = "";
  snapshot.forEach((docItem) => {
    const data = docItem.data();
    html += `
      <div class="blog-item">
        <h3>${escapeHtml(data.title)}</h3>
        <p>${escapeHtml(data.content.substring(0, 100))}...</p>
        <div class="blog-meta">
          <button class="btn btn-edit" onclick='editBlog(
  "${docItem.id}",
  ${JSON.stringify(data.title)},
  ${JSON.stringify(data.content)},
  "${data.image || ""}",
  ${JSON.stringify(data.metaTitle || "")},
  ${JSON.stringify(data.metaDesc || "")},
  ${JSON.stringify(data.faq || [])}
)''>
            ✏️ Edit
          </button>
          <button class="btn btn-delete" onclick="deleteBlog('${docItem.id}')">
            🗑️ Delete
          </button>
        </div>
      </div>
    `;
  });
  document.getElementById('blogList').innerHTML = html || '<div class="empty-state"><p>✨ No blogs found. Start writing!</p></div>';
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

window.editBlog = function(id, t, c, img, metaT = "", metaD = "", faqArr = []) {
  editId = id;
  currentImageUrl = img;

  document.getElementById('title').value = t;
  document.getElementById('metaTitle').value = metaT;
  document.getElementById('metaDesc').value = metaD;

  editor.setData(c);

  // ✅ FIXED
  faqs = faqArr;
  renderFAQs();

  if (img) {
    const previewDiv = document.getElementById('imagePreview');
    previewDiv.style.display = 'block';
    previewDiv.innerHTML = `<img src="${img}">`;
  }

  document.getElementById('formTitle').innerHTML = "✏️ Edit Blog";
};

window.deleteBlog = async function(id) {
  if (!confirm("⚠️ Permanently delete this blog post?")) return;
  await deleteDoc(doc(db, "blogs", id));
  showToast("Blog deleted successfully");
  loadBlogs();
};

// initial load guard
window.loadBlogs = loadBlogs;
let faqs = [];

window.addFAQ = function(question = "", answer = "") {
  const index = faqs.length;

  faqs.push({ question, answer });

  const container = document.getElementById("faqContainer");

  const div = document.createElement("div");
  div.style.marginBottom = "15px";

  div.innerHTML = `
    <input type="text" placeholder="Question" value="${question}" 
      onchange="updateFAQ(${index}, 'question', this.value)" 
      style="margin-bottom:5px;" />

    <textarea placeholder="Answer"
      onchange="updateFAQ(${index}, 'answer', this.value)">${answer}</textarea>

    <button onclick="removeFAQ(${index})" style="margin-top:5px;">❌ Remove</button>
  `;

  container.appendChild(div);
};

window.updateFAQ = function(index, field, value) {
  faqs[index][field] = value;
};

window.removeFAQ = function(index) {
  faqs.splice(index, 1);
  renderFAQs();
};

function renderFAQs() {
  const container = document.getElementById("faqContainer");
  container.innerHTML = "";
  faqs.forEach(faq => addFAQ(faq.question, faq.answer));
}

</script>
